<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-MSKNHHV9M6"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-MSKNHHV9M6');
    </script>
    <link rel="icon" type="image/jpeg" href="1000034613.jpg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tithe Calculator | House of Judah</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #2d0b5a; color: white; display: flex; flex-direction: column; min-height: 100vh; text-align: center; }
        nav { background: #2d0b5a; padding: 1.5rem 5%; border-bottom: 3px solid #d4af37; display: flex; justify-content: center; align-items: center; }
        .logo-text { color: #d4af37; font-weight: bold; letter-spacing: 2px; font-size: 1.5rem; text-transform: uppercase; text-decoration: none; }
        .calc-card { background: rgba(255, 255, 255, 0.08); padding: 30px; border-radius: 15px; border: 1px solid rgba(212, 175, 55, 0.3); max-width: 400px; margin: 40px auto; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: none; font-size: 1.1rem; box-sizing: border-box; }
        footer { background: #1a1a1a; color: #aaa; padding: 25px; font-size: 0.85rem; margin-top: auto; }
    </style>
</head>
<body>
    <nav><a href="index.html" class="logo-text">HOUSE OF JUDAH</a></nav>
    <div class="calc-card">
        <h2>Tithe Calculator</h2>
        <input type="number" id="income" placeholder="Enter Amount ($)">
        <p>1st Tithe: $<span id="t1">0</span></p>
        <p>2nd Tithe: $<span id="t2">0</span></p>
    </div>
    <a href="index.html" style="color:#d4af37; text-decoration:none; font-weight:bold;">← BACK TO HOME</a>
    <footer>2026 House of Judah</footer>
    <script>
        document.getElementById('income').addEventListener('input', function(e){
            let val = e.target.value;
            document.getElementById('t1').innerText = (val * 0.10).toFixed(2);
            document.getElementById('t2').innerText = (val * 0.10).toFixed(2);
        });
    </script>
</body>
</html>
