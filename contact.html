<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-MSKNHHV9M6"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-MSKNHHV9M6');
    </script>

    <link rel="icon" type="image/jpeg" href="1000034613.jpg">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | House of Judah</title>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; 
            background: #2d0b5a; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
            text-align: center;
        }
        nav { 
            background: #2d0b5a; 
            padding: 1.5rem 5%; 
            border-bottom: 3px solid #d4af37;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .logo-text { 
            color: #d4af37; 
            font-weight: bold; 
            letter-spacing: 2px; 
            font-size: 1.5rem; 
            text-transform: uppercase;
            text-decoration: none;
        }
        .container { 
            flex: 1; 
            padding: 40px 20px; 
            max-width: 500px; 
            margin: auto; 
        }
        h1 { color: #d4af37; margin-bottom: 20px; }
        
        .contact-card { 
            background: rgba(255, 255, 255, 0.08); 
            padding: 30px; 
            border-radius: 15px; 
            border: 1px solid rgba(212, 175, 55, 0.3); 
            text-align: left;
        }
        
        label { display: block; margin-top: 15px; color: #d4af37; font-weight: bold; }
        
        input, textarea { 
            width: 100%; 
            padding: 12px; 
            border-radius: 8px; 
            border: none; 
            margin-top: 5px; 
            font-family: inherit; 
            font-size: 1rem; 
            box-sizing: border-box; 
        }
        
        .send-btn { 
            background: #d4af37; 
            color: #2d0b5a; 
            width: 100%; 
            padding: 15px; 
            border: none; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 25px; 
            border-radius: 8px; 
            text-transform: uppercase; 
            font-size: 1rem; 
            transition: 0.3s;
        }
        .send-btn:hover { background: white; }
        
        .back-link { display: block; margin-top: 30px; color: #fff; text-decoration: none; font-weight: bold; opacity: 0.8; text-align: center;}
        
        footer { 
            background: #1a1a1a; 
            color: #aaa; 
            padding: 25px; 
            font-size: 0.85rem; 
            margin-top: auto;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo-text">HOUSE OF JUDAH</a>
    </nav>

    <div class="container">
        <h1>Contact Us</h1>
        <div class="contact-card">
            <p style="text-align: center;">Leave your information below. We will review your message and reach out if necessary.</p>
            
            <form action="https://formspree.io/f/your-id-here" method="POST">
                <label>Your Name</label>
                <input type="text" name="name" placeholder="Full Name" required>

                <label>How to reach you</label>
                <input type="text" name="contact_info" placeholder="Email or Phone Number" required>

                <label>Your Message</label>
                <textarea name="message" rows="4" placeholder="Type your message here..." required></textarea>
                
                <button type="submit" class="send-btn">Submit Information</button>
            </form>
        </div>
        <a href="index.html" class="back-link">← Back to Home</a>
    </div>

    <footer>
        2026 House of Judah
    </footer>

</body>
</html>
