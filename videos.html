<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videos | House of Judah</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        nav {
            background: #2d0b5a;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #d4af37;
        }
        .logo a {
            text-decoration: none;
            font-weight: bold;
            color: #d4af37;
            letter-spacing: 2px;
        }
        .nav-links {
            list-style: none;
            display: flex;
            margin: 0;
        }
        .nav-links li {
            margin-left: 20px;
        }
        .nav-links a {
            color: #fff;
            text-decoration: none;
            font-size: 0.9rem;
            text-transform: uppercase;
        }
        .content {
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        h2 {
            color: #2d0b5a;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .video-container {
            width: 100%;
            max-width: 800px;
            margin: 40px 0;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        /* This makes the video responsive on mobile */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .yt-btn {
            background: #ff0000; /* YouTube Red */
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            display: inline-block;
            margin-top: 20px;
            transition: background 0.3s;
        }
        .yt-btn:hover {
            background: #cc0000;
        }
        footer {
            background: #1a1a1a;
            color: #888;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo"><a href="index.html">HOUSE OF JUDAH</a></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="meetings.html">Meetings</a></li>
            <li><a href="events.html">Events</a></li>
            <li><a href="videos.html" style="color:#d4af37;">Videos</a></li>
        </ul>
    </nav>

    <section class="content">
        <h2>Watch Online</h2>
        <p>Catch up on our latest Bible Studies and messages.</p>

        <div class="video-container">
            <div class="video-wrapper">
                <iframe src="https://www.youtube.com/embed/DU7AU9o6BZA" 
                        frameborder="0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                        allowfullscreen>
                </iframe>
            </div>
        </div>

        <p>Want to see more?</p>
        <a href="https://www.youtube.com/@HouseofJudahTheNobleBunch-u2s
" class="yt-btn" target="_blank">Visit Our YouTube Channel</a>
    </section>

    <footer>
        &copy; 2026 House of Judah
    </footer>

</body>
</html>
