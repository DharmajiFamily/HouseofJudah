<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | House of Judah</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #333;
        }
        nav {
            background: #2d0b5a;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #d4af37;
        }
        .logo a {
            text-decoration: none;
            font-weight: bold;
            color: #d4af37;
            letter-spacing: 2px;
        }
        .nav-links {
            list-style: none;
            display: flex;
            margin: 0;
        }
        .nav-links li {
            margin-left: 20px;
        }
        .nav-links a {
            color: #fff;
            text-decoration: none;
            font-size: 0.9rem;
            text-transform: uppercase;
        }
        .container {
            max-width: 600px;
            margin: 60px auto;
            padding: 0 20px;
        }
        .contact-header {
            text-align: center;
            margin-bottom: 40px;
        }
        h2 {
            color: #2d0b5a;
            font-size: 2.5rem;
        }
        .form-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-top: 8px solid #d4af37;
        }
        .form-card p {
            margin-bottom: 20px;
            font-weight: bold;
            color: #555;
        }
        textarea {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 1rem;
            resize: vertical;
        }
        .submit-btn {
            background: #2d0b5a;
            color: #d4af37;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            font-size: 1.1rem;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .submit-btn:hover {
            background: #d4af37;
            color: #2d0b5a;
        }
        .info-box {
            margin-top: 30px;
            text-align: center;
            font-size: 0.9rem;
            color: #777;
        }
        footer {
            background: #1a1a1a;
            color: #888;
            text-align: center;
            padding: 20px;
            margin-top: 60px;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo"><a href="index.html">HOUSE OF JUDAH</a></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="meetings.html">Meetings</a></li>
            <li><a href="events.html">Events</a></li>
            <li><a href="videos.html">Videos</a></li>
            <li><a href="contact.html" style="color:#d4af37;">Contact</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="contact-header">
            <h2>Anonymous Message</h2>
            <p>Your privacy is important. Send us a message without sharing your details.</p>
        </div>

        <div class="form-card">
            <form action="https://formspree.io/f/xwvapyrv" method="POST">
                <p>Type your message below:</p>
                <textarea name="message" rows="8" placeholder="Share your thoughts, prayer requests, or questions..." required></textarea>
                
                <input type="hidden" name="_subject" value="New Anonymous Message from Website">
                
                <button type="submit" class="submit-btn">Send Message</button>
            </form>
        </div>

        
    </div>

    <footer>
         2026 House of Judah
    </footer>

</body>
</html>
