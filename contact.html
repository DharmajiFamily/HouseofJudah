<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | House of Judah</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #f4f4f4; display: flex; flex-direction: column; align-items: center; }
        nav { background: #2d0b5a; width: 100%; padding: 1.2rem 0; text-align: center; border-bottom: 3px solid #d4af37; }
        .logo { color: #d4af37; font-weight: bold; text-decoration: none; font-size: 1.4rem; letter-spacing: 2px; }
        .card { background: white; padding: 40px; border-radius: 15px; margin: 50px 20px; max-width: 500px; width: 90%; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 8px solid #d4af37; text-align: center; }
        textarea { width: 100%; padding: 15px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-family: inherit; font-size: 1rem; margin-top: 20px; }
        .btn { background: #2d0b5a; color: #d4af37; width: 100%; padding: 15px; border: none; font-weight: bold; cursor: pointer; margin-top: 15px; border-radius: 8px; text-transform: uppercase; font-size: 1rem; transition: 0.3s; }
        .btn:hover { background: #d4af37; color: #2d0b5a; }
    </style>
</head>
<body>
    <nav><a href="index.html" class="logo">HOUSE OF JUDAH</a></nav>
    <div class="card">
        <h2 style="color: #2d0b5a; margin-top:0;">Message Us </h2>
        <p style="color: #666;">Important: Please make sure you leave your phone number, Name and email.</p>
        <form action="https://formspree.io/f/mqewajpb" method="POST">
            <textarea name="message" rows="6" placeholder="Write your message here..." required></textarea>
            <button type="submit" class="btn">Send Message</button>
        </form>
        <a href="index.html" style="color:#2d0b5a; text-decoration:none; font-weight:bold;">← Back Home</a>
    </div>
</body>
</html>
