<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House of Judah | Welcome</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        nav {
            background: #2d0b5a;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #d4af37;
        }
        .logo {
            font-weight: bold;
            color: #d4af37;
            letter-spacing: 2px;
            font-size: 1.2rem;
        }
        .hero {
            background: #2d0b5a;
            color: white;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 20px;
        }
        h1 {
            font-size: clamp(2rem, 8vw, 4rem);
            color: #d4af37;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            max-width: 600px;
        }
        .btn {
            background: #d4af37;
            color: #2d0b5a;
            padding: 18px 40px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            text-transform: uppercase;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .btn:hover {
            background: #ffffff;
            transform: translateY(-3px);
        }
        footer {
            background: #1a1a1a;
            color: #888;
            text-align: center;
            padding: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">HOUSE OF JUDAH</div>
    </nav>

    <section class="hero">
        <h1>Welcome to House of Judah</h1>
        <p>A place of fellowship and growth. We are glad you are here.</p>
        <a href="meetings.html" class="btn">View Schedule</a>
    </section>

    <footer>
        &copy; 2026 House of Judah
    </footer>

</body>
</html>
