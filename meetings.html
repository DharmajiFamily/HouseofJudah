<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetings | House of Judah</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        nav {
            background: #2d0b5a;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #d4af37;
        }
        .logo a {
            text-decoration: none;
            font-weight: bold;
            color: #d4af37;
            letter-spacing: 2px;
        }
        .content {
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h2 {
            color: #2d0b5a;
            font-size: 2rem;
            margin-bottom: 40px;
            text-align: center;
        }
        .card {
            background: white;
            width: 100%;
            max-width: 500px;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-top: 8px solid #d4af37;
            text-align: center;
        }
        .meeting-title {
            font-size: 1.8rem;
            color: #2d0b5a;
            margin-bottom: 10px;
            display: block;
        }
        .day {
            font-size: 1.4rem;
            color: #333;
            font-weight: bold;
            margin: 10px 0;
        }
        .time {
            font-size: 2rem;
            color: #d4af37;
            background: #2d0b5a;
            display: inline-block;
            padding: 5px 20px;
            border-radius: 5px;
            margin: 15px 0;
        }
        .back-link {
            margin-top: 30px;
            display: inline-block;
            color: #2d0b5a;
            text-decoration: none;
            font-weight: bold;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo"><a href="index.html">HOUSE OF JUDAH</a></div>
    </nav>

    <section class="content">
        <h2>Our Meeting Schedule</h2>

        <div class="card">
            <span class="meeting-title">Bible Study</span>
            <div class="day">2nd & 4th Saturday</div>
            <div class="time">12:00 PM</div>
            <p><strong>Location:</strong> Community Hall</p>
            <p>Join us for in-depth study and fellowship. Both on phone and in-person options are available.</p>
        </div>

        <a href="index.html" class="back-link">← Back to Home</a>
    </section>

</body>
</html>
